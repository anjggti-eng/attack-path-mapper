version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: attackpath-postgres
    environment:
      POSTGRES_DB: attackpath
      POSTGRES_USER: attackpath
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-attackpath123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attackpath"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: attackpath-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-attackpath123}
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: attackpath-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attackpath-backend
    environment:
      DATABASE_URL: postgresql://attackpath:${POSTGRES_PASSWORD:-attackpath123}@postgres:5432/attackpath
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-attackpath123}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: attackpath-frontend
    ports:
      - "3001:3001"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    environment:
      PORT: 3001
      REACT_APP_API_URL: http://localhost:8000/api

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
